<div class="min-h-screen bg-navy-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

  <!-- Logo -->
<div class="text-center mb-8">
  <div class="flex items-center justify-center mb-4">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="16" fill="#F59E0B"/>
      <rect x="8" y="8" width="20" height="20" rx="4" fill="white" fill-opacity="0.3"/>
      <rect x="8" y="32" width="20" height="24" rx="4" fill="white" fill-opacity="0.9"/>
      <rect x="32" y="8" width="24" height="17" rx="3" fill="white" fill-opacity="0.9"/>
      <rect x="32" y="30" width="24" height="26" rx="4" fill="white" fill-opacity="0.6"/>
      <circle cx="18" cy="18" r="5" fill="white"/>
      <path d="M44 14 L44 20 M41 17 L47 17" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1 class="text-3xl font-bold text-white tracking-tight">ProcureFlow</h1>
  <p class="text-navy-400 mt-2 text-sm">Source to Pay Platform</p>
</div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-navy-800 mb-1">Welcome back</h2>
      <p class="text-navy-400 text-sm mb-6">Sign in to your account to continue</p>

      <!-- Error Message -->
      @if (errorMessage) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <i class="pi pi-exclamation-circle text-red-500 text-sm"></i>
          <p class="text-red-600 text-sm">{{ errorMessage }}</p>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-navy-700">Email address</label>
          <input
            pInputText
            formControlName="email"
            placeholder="you@company.com"
            class="w-full"
            [class.border-red-300]="errorMessage"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-navy-700">Password</label>
          <p-password
            formControlName="password"
            placeholder="Enter your password"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
          />
        </div>

        <p-button
          type="submit"
          [label]="loading ? 'Signing in...' : 'Sign In'"
          [loading]="loading"
          styleClass="w-full"
          [style]="{'background': '#F59E0B', 'border-color': '#F59E0B', 'font-weight': '600'}"
        />

      </form>
    </div>

    <p class="text-center text-navy-500 text-xs mt-6">
      © 2026 ProcureFlow. Enterprise Procurement Platform.
    </p>

  </div>

</div>
