<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <p-card class="w-full max-w-md">
    
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-primary">ProcureFlow</h1>
      <p class="text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      
      <div class="flex flex-col gap-1">
        <label class="font-medium">Email</label>
        <input pInputText formControlName="email" placeholder="Enter your email" class="w-full" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-medium">Password</label>
        <p-password formControlName="password" placeholder="Enter your password" [feedback]="false" [toggleMask]="true" styleClass="w-full" />
      </div>

      <p-button type="submit" label="Sign In" styleClass="w-full mt-2" />
      
    </form>

  </p-card>
</div>
