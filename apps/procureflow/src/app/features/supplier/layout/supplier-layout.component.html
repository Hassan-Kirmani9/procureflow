<div class="flex h-screen bg-navy-50 overflow-hidden">

  <div class="w-64 bg-navy-800 flex flex-col shadow-xl">
    <div class="p-6 border-b border-navy-700">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center">
          <i class="pi pi-briefcase text-white text-sm"></i>
        </div>
        <div>
          <h1 class="text-white font-bold text-lg leading-none">ProcureFlow</h1>
          <p class="text-navy-400 text-xs mt-0.5">Supplier Portal</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 flex flex-col gap-1">
      <a routerLink="/supplier/rfq" routerLinkActive="bg-primary-500 text-white"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-navy-300 hover:bg-navy-700 hover:text-white transition-all cursor-pointer text-sm font-medium">
        <i class="pi pi-envelope w-4"></i>
        RFQ Invitations
      </a>
      <a routerLink="/supplier/purchase-orders" routerLinkActive="bg-primary-500 text-white"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-navy-300 hover:bg-navy-700 hover:text-white transition-all cursor-pointer text-sm font-medium">
        <i class="pi pi-shopping-cart w-4"></i>
        Purchase Orders
      </a>
      <a routerLink="/supplier/invoices" routerLinkActive="bg-primary-500 text-white"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-navy-300 hover:bg-navy-700 hover:text-white transition-all cursor-pointer text-sm font-medium">
        <i class="pi pi-receipt w-4"></i>
        Invoices
      </a>
    </nav>

    <div class="p-4 border-t border-navy-700">
      <button (click)="logout()"
        class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-red-400 hover:bg-red-500 hover:text-white transition-all text-sm font-medium">
        <i class="pi pi-sign-out w-4"></i>
        Logout
      </button>
    </div>
  </div>

  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white border-b border-navy-200 px-6 py-4 flex items-center justify-between shadow-sm">
      <div>
        <h2 class="text-lg font-semibold text-navy-800">Supplier Panel</h2>
        <p class="text-xs text-navy-400">Manage quotes, orders and invoices</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-primary-100 rounded-full flex items-center justify-center">
          <i class="pi pi-user text-primary-600 text-sm"></i>
        </div>
        <div class="text-right">
          <p class="text-sm font-medium text-navy-800">Supplier</p>
          <p class="text-xs text-navy-400">Vendor</p>
        </div>
      </div>
    </div>
    <main class="flex-1 overflow-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
