<div class="flex flex-col gap-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Department Management</h1>
      <p class="text-gray-500 text-sm mt-1">Manage company departments</p>
    </div>
    <p-button label="Create Department" icon="pi pi-plus" (click)="openDialog()" />
  </div>

  <p-table [value]="departments" [loading]="loading" [stripedRows]="true">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Code</th>
        <th>Budget</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-dept>
      <tr>
        <td>{{ dept.name }}</td>
        <td>{{ dept.code }}</td>
        <td>{{ dept.budget | number }}</td>
        <td>
          <p-tag [value]="dept.isActive ? 'Active' : 'Inactive'" [severity]="dept.isActive ? 'success' : 'danger'" />
        </td>
        <td>
          <p-button label="Deactivate" severity="danger" size="small" [outlined]="true" (click)="deactivate(dept._id)" [disabled]="!dept.isActive" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center text-gray-500 py-8">No departments found</td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog header="Create Department" [(visible)]="showDialog" [modal]="true" [style]="{width: '400px'}">
    <form [formGroup]="form" class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Department Name</label>
        <input pInputText formControlName="name" placeholder="e.g. Engineering" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Code</label>
        <input pInputText formControlName="code" placeholder="e.g. ENG001" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Annual Budget</label>
        <input pInputText type="number" formControlName="budget" placeholder="0" class="w-full" />
      </div>
    </form>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="showDialog = false" />
      <p-button label="Create" (click)="createDepartment()" />
    </ng-template>
  </p-dialog>

</div>
