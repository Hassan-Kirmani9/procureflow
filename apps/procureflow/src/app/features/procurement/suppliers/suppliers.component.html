<div class="flex flex-col gap-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Supplier Management</h1>
      <p class="text-gray-500 text-sm mt-1">Manage and verify suppliers</p>
    </div>
    <p-button label="Add Supplier" icon="pi pi-plus" (click)="openDialog()" />
  </div>

  <p-table [value]="suppliers" [loading]="loading" [stripedRows]="true">
    <ng-template pTemplate="header">
      <tr>
        <th>Company</th>
        <th>Contact</th>
        <th>Categories</th>
        <th>Score</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-supplier>
      <tr>
        <td>{{ supplier.companyName }}</td>
        <td>{{ supplier.contactEmail }}</td>
        <td>{{ supplier.categories?.join(', ') }}</td>
        <td>{{ supplier.performanceScore }}/5</td>
        <td>
          <p-tag [value]="supplier.status" [severity]="getSeverity(supplier.status)" />
        </td>
        <td class="flex gap-2">
          <p-button
            label="Verify"
            severity="success"
            size="small"
            [outlined]="true"
            (click)="verify(supplier._id)"
            [disabled]="supplier.status === 'verified'"
          />
          <p-button
            label="Blacklist"
            severity="danger"
            size="small"
            [outlined]="true"
            (click)="blacklist(supplier._id)"
            [disabled]="supplier.status === 'blacklisted'"
          />
          <p-button
            label="Score"
            severity="info"
            size="small"
            [outlined]="true"
            (click)="openScoreDialog(supplier)"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center text-gray-500 py-8">No suppliers found</td>
      </tr>
    </ng-template>
  </p-table>

  <!-- Create Supplier Dialog -->
  <p-dialog header="Add Supplier Profile" [(visible)]="showDialog" [modal]="true" [style]="{width:'500px'}">
    <form [formGroup]="form" class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Supplier User</label>
        <select formControlName="userId" class="w-full border rounded-md p-2">
          <option value="">Select supplier user</option>
          @for (user of supplierUsers; track user._id) {
            <option [value]="user._id">{{ user.name }} ({{ user.email }})</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Company Name</label>
        <input pInputText formControlName="companyName" placeholder="Company name" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Contact Email</label>
        <input pInputText formControlName="contactEmail" placeholder="Contact email" class="w-full" />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-medium text-sm">Phone</label>
          <input pInputText formControlName="phone" placeholder="Phone number" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-medium text-sm">Address</label>
          <input pInputText formControlName="address" placeholder="Address" class="w-full" />
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Categories</label>
        <input pInputText formControlName="categories" placeholder="IT, Construction, Logistics (comma separated)" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Notes</label>
        <input pInputText formControlName="notes" placeholder="Additional notes" class="w-full" />
      </div>
    </form>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="showDialog = false" />
      <p-button label="Add Supplier" (click)="createSupplier()" />
    </ng-template>
  </p-dialog>

  <!-- Score Dialog -->
  <p-dialog header="Update Performance Score" [(visible)]="showScoreDialog" [modal]="true" [style]="{width:'350px'}">
    <form [formGroup]="scoreForm" class="pt-2">
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Score (0-5)</label>
        <input pInputText type="number" formControlName="score" min="0" max="5" class="w-full" />
      </div>
    </form>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="showScoreDialog = false" />
      <p-button label="Update Score" (click)="updateScore()" />
    </ng-template>
  </p-dialog>

</div>
