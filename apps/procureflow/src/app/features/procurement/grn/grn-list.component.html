<div class="flex flex-col gap-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Goods Receipt Notes</h1>
      <p class="text-gray-500 text-sm mt-1">Log and track goods received against POs</p>
    </div>
    <p-button label="Log GRN" icon="pi pi-plus" (click)="openDialog()" />
  </div>

  <p-table [value]="grns" [loading]="loading" [stripedRows]="true">
    <ng-template pTemplate="header">
      <tr>
        <th>PO Number</th>
        <th>Qty Ordered</th>
        <th>Qty Received</th>
        <th>Received By</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-grn>
      <tr>
        <td>{{ grn.purchaseOrder?.poNumber }}</td>
        <td>{{ grn.quantityOrdered }}</td>
        <td>{{ grn.quantityReceived }}</td>
        <td>{{ grn.receivedBy }}</td>
        <td>
          <p-tag [value]="grn.status" [severity]="getSeverity(grn.status)" />
        </td>
        <td>{{ grn.receivedAt | date:'mediumDate' }}</td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center text-gray-500 py-8">No GRNs found</td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog header="Log Goods Receipt" [(visible)]="showDialog" [modal]="true" [style]="{width:'500px'}">
    <form [formGroup]="form" class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Purchase Order</label>
        <select formControlName="purchaseOrderId" class="w-full border rounded-md p-2">
          <option value="">Select PO</option>
          @for (po of approvedPOs; track po._id) {
            <option [value]="po._id">{{ po.poNumber }} — {{ po.title }}</option>
          }
        </select>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-medium text-sm">Qty Ordered</label>
          <input pInputText type="number" formControlName="quantityOrdered" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-medium text-sm">Qty Received</label>
          <input pInputText type="number" formControlName="quantityReceived" class="w-full" />
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Received By</label>
        <input pInputText formControlName="receivedBy" placeholder="Name of person who received" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Discrepancy Notes (if any)</label>
        <input pInputText formControlName="discrepancyNotes" placeholder="Note any issues with delivery" class="w-full" />
      </div>
    </form>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="showDialog = false" />
      <p-button label="Log Receipt" (click)="createGRN()" />
    </ng-template>
  </p-dialog>

</div>
