<div class="flex h-screen bg-gray-100">
  <div class="w-64 bg-white shadow-md flex flex-col">
    <div class="p-6 border-b">
      <h1 class="text-xl font-bold text-primary">ProcureFlow</h1>
      <p class="text-xs text-gray-500 mt-1">Procurement Portal</p>
    </div>
    <nav class="flex-1 p-4 flex flex-col gap-2">
      <a routerLink="/procurement/dashboard" routerLinkActive="bg-primary text-white" class="px-4 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">Dashboard</a>
      <a routerLink="/procurement/purchase-requests" routerLinkActive="bg-primary text-white" class="px-4 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">Purchase Requests</a>
      <a routerLink="/procurement/rfq" routerLinkActive="bg-primary text-white" class="px-4 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">RFQs</a>
      <a routerLink="/procurement/purchase-orders" routerLinkActive="bg-primary text-white" class="px-4 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">Purchase Orders</a>
      <a routerLink="/procurement/suppliers" routerLinkActive="bg-primary text-white" class="px-4 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">Suppliers</a>
    </nav>
    <div class="p-4 border-t">
      <button (click)="logout()" class="w-full text-left px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg">Logout</button>
    </div>
  </div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white shadow-sm px-6 py-4">
      <h2 class="text-lg font-semibold text-gray-700">Procurement Panel</h2>
    </div>
    <main class="flex-1 overflow-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
